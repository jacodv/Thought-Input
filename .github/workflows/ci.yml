name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-app:
    name: macOS (Build + Test)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: macos-app
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          # Find the highest Xcode version installed on the runner
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            echo "No Xcode found"
            exit 1
          fi
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: macos-app/.build
          key: spm-${{ runner.os }}-${{ hashFiles('macos-app/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test --verbose

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          APP="ThoughtInput.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          # Copy binary
          cp .build/release/ThoughtInput "$APP/MacOS/ThoughtInput"

          # Copy Info.plist
          cp Sources/ThoughtInput/Resources/Info.plist "$APP/Info.plist"

          # Compile asset catalog (produces Assets.car + AppIcon.icns)
          xcrun actool Sources/ThoughtInput/Resources/Assets.xcassets \
            --compile "$APP/Resources" \
            --platform macosx \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /dev/null

          # Copy SPM-bundled resources (compiled resource bundle)
          if [ -d .build/release/ThoughtInput_ThoughtInput.bundle ]; then
            cp -R .build/release/ThoughtInput_ThoughtInput.bundle "$APP/Resources/"
          fi

          # Create PkgInfo
          echo -n "APPL????" > "$APP/PkgInfo"

          # Zip for upload
          ditto -c -k --keepParent ThoughtInput.app ThoughtInput.app.zip

      - name: Upload macOS app
        uses: actions/upload-artifact@v7
        with:
          name: thought-input-macos-release
          path: macos-app/ThoughtInput.app.zip

  android-app:
    name: Android (Build + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: thought-input-android-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-results
          path: android-app/app/build/reports/tests/
