name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  macos:
    name: Build macOS .app.zip
    runs-on: macos-latest
    defaults:
      run:
        working-directory: macos-app
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            echo "No Xcode found"; exit 1
          fi
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          APP="ThoughtInput.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          cp .build/release/ThoughtInput "$APP/MacOS/ThoughtInput"
          cp Sources/ThoughtInput/Resources/Info.plist "$APP/Info.plist"

          xcrun actool Sources/ThoughtInput/Resources/Assets.xcassets \
            --compile "$APP/Resources" \
            --platform macosx \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /dev/null

          if [ -d .build/release/ThoughtInput_ThoughtInput.bundle ]; then
            cp -R .build/release/ThoughtInput_ThoughtInput.bundle "$APP/Resources/"
          fi

          printf 'APPL????' > "$APP/PkgInfo"

          ditto -c -k --keepParent ThoughtInput.app ThoughtInput-macOS.zip

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: macos-app/ThoughtInput-macOS.zip
          retention-days: 7

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Stage with stable filename
        run: |
          mkdir -p ../staging
          cp app/build/outputs/apk/debug/app-debug.apk ../staging/ThoughtInput-Android.apk

      - uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: staging/ThoughtInput-Android.apk
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [macos, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v6
        with:
          name: release-macos
          path: dist/

      - uses: actions/download-artifact@v6
        with:
          name: release-android
          path: dist/

      - name: Compute release metadata
        id: meta
        env:
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +'%Y-%m-%d')
          TAG="v${RUN_NUMBER}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          {
            echo "tag=${TAG}"
            echo "title=Build ${RUN_NUMBER} (${DATE} — ${SHORT_SHA})"
          } >> "$GITHUB_OUTPUT"

          # Multi-line release body via heredoc
          {
            echo 'body<<RELEASE_BODY_EOF'
            cat <<EOF
## Downloads

Pick the file for your operating system:

| Platform | Download | First-time install notes |
|---|---|---|
| 🍎 **macOS** 15+ | [\`ThoughtInput-macOS.zip\`](${BASE_URL}/ThoughtInput-macOS.zip) | Unzip → drag \`ThoughtInput.app\` into \`/Applications\`. First launch: right-click → **Open** (or run \`xattr -dr com.apple.quarantine /Applications/ThoughtInput.app\`). |
| 🤖 **Android** 10+ | [\`ThoughtInput-Android.apk\`](${BASE_URL}/ThoughtInput-Android.apk) | Tap the file on your device. Allow **Install unknown apps** for your browser if prompted. |
| 🪟 **Windows** | _Coming soon_ | — |

> Both apps need a destination configured before they'll deliver captures (Supabase, REST, etc.). See the [Backend Setup Guide](https://github.com/${REPO}/blob/main/docs/SETUP-GUIDE.md). For Supabase you can hit **Initialize Database** in the destination editor to bootstrap the schema in one click.

EOF
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body: ${{ steps.meta.outputs.body }}
          append_body: true
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == true }}
          files: |
            dist/ThoughtInput-macOS.zip
            dist/ThoughtInput-Android.apk
          fail_on_unmatched_files: true
