name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  macos:
    name: Build macOS .app.zip
    runs-on: macos-latest
    defaults:
      run:
        working-directory: macos-app
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            echo "No Xcode found"; exit 1
          fi
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"

      - name: Build (release)
        run: swift build -c release

      - name: Package .app bundle
        run: |
          APP="ThoughtInput.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"

          cp .build/release/ThoughtInput "$APP/MacOS/ThoughtInput"
          cp Sources/ThoughtInput/Resources/Info.plist "$APP/Info.plist"

          xcrun actool Sources/ThoughtInput/Resources/Assets.xcassets \
            --compile "$APP/Resources" \
            --platform macosx \
            --minimum-deployment-target 15.0 \
            --app-icon AppIcon \
            --output-partial-info-plist /dev/null

          if [ -d .build/release/ThoughtInput_ThoughtInput.bundle ]; then
            cp -R .build/release/ThoughtInput_ThoughtInput.bundle "$APP/Resources/"
          fi

          printf 'APPL????' > "$APP/PkgInfo"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .dmg with branded background
        working-directory: ${{ github.workspace }}
        run: |
          STAGE="$(mktemp -d)"
          cp -R macos-app/ThoughtInput.app "$STAGE/"

          create-dmg \
            --volname "Thought Input" \
            --background "assets/branding/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 540 380 \
            --icon-size 100 \
            --icon "ThoughtInput.app" 140 200 \
            --hide-extension "ThoughtInput.app" \
            --app-drop-link 400 200 \
            --no-internet-enable \
            "ThoughtInput-macOS.dmg" \
            "$STAGE"

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: ThoughtInput-macOS.dmg
          retention-days: 7

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v5

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Stage with stable filename
        run: |
          mkdir -p ../staging
          cp app/build/outputs/apk/debug/app-debug.apk ../staging/ThoughtInput-Android.apk

      - uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: staging/ThoughtInput-Android.apk
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [macos, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v6
        with:
          name: release-macos
          path: dist/

      - uses: actions/download-artifact@v6
        with:
          name: release-android
          path: dist/

      - name: Compute release metadata
        id: meta
        env:
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +'%Y-%m-%d')
          TAG="v${RUN_NUMBER}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          {
            echo "tag=${TAG}"
            echo "title=Build ${RUN_NUMBER} (${DATE} — ${SHORT_SHA})"
          } >> "$GITHUB_OUTPUT"

          # Multi-line release body — written to a file and consumed via body_path.
          # All lines stay indented under the run block scalar; YAML strips the
          # common leading indent before the shell sees the heredoc.
          cat > "$GITHUB_WORKSPACE/release-body.md" <<EOF
          ## Downloads

          Pick the file for your operating system:

          | Platform | Download | First-time install notes |
          |---|---|---|
          | 🍎 **macOS** 15+ | [\`ThoughtInput-macOS.dmg\`](${BASE_URL}/ThoughtInput-macOS.dmg) | Open the .dmg → drag \`ThoughtInput.app\` onto the Applications folder. First launch: right-click → **Open** (or run \`xattr -dr com.apple.quarantine /Applications/ThoughtInput.app\`). |
          | 🤖 **Android** 10+ | [\`ThoughtInput-Android.apk\`](${BASE_URL}/ThoughtInput-Android.apk) | Tap the file on your device. Allow **Install unknown apps** for your browser if prompted. |
          | 🪟 **Windows** | _Coming soon_ | — |

          > Both apps need a destination configured before they'll deliver captures (Supabase, REST, etc.). See the [Backend Setup Guide](https://github.com/${REPO}/blob/main/docs/SETUP-GUIDE.md). For Supabase you can hit **Initialize Database** in the destination editor to bootstrap the schema in one click.
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          body_path: release-body.md
          append_body: true
          generate_release_notes: true
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == true }}
          files: |
            dist/ThoughtInput-macOS.dmg
            dist/ThoughtInput-Android.apk
          fail_on_unmatched_files: true
